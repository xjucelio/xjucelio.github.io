<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <title>JDS Apps • Smart Utilities</title>
  <meta name="description" content="JDS Apps - Privacy-first, offline-ready mobile applications for daily utility." />
  <meta name="theme-color" content="#0b1016" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg0: #050505;
      --bg1: #0b1016;
      --text: #ffffff;
      --muted: #94a3b8;
      --muted2: #64748b;
      --gold: #f7d35f;
      --gold-glow: rgba(247, 211, 95, 0.2);
      --teal: #4ade80;
      --teal-glow: rgba(74, 222, 128, 0.2);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --stroke: rgba(255, 255, 255, 0.12);
      --radius: 24px;
      --container-width: 800px;
    }

    * { box-sizing: border-box; outline: none; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg0);
      color: var(--text);
      line-height: 1.5;
      margin: 0;
      background: radial-gradient(600px at 50% 0%, rgba(110, 231, 255, 0.04), transparent), var(--bg0);
      min-height: 100vh;
    }

    .noise {
      position: fixed; inset: 0; pointer-events: none; opacity: 0.04; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .container {
      width: 100%;
      max-width: var(--container-width);
      margin: 0 auto;
      padding: 30px 20px; /* Reduzido o padding vertical */
      position: relative; z-index: 2;
    }

    header { text-align: center; margin-bottom: 30px; } /* Margem reduzida pela metade */
    header h1 { 
      font-size: clamp(28px, 6vw, 40px); 
      font-weight: 800; 
      letter-spacing: -1px; 
      margin: 0; 
      background: linear-gradient(180deg, #fff, #aaa); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }
    header p { color: var(--muted); font-size: 16px; margin: 5px 0 0 0; }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      justify-content: center;
    }

    .app-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 30px; /* Padding interno mais compacto */
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      max-width: 380px;
      margin: 0 auto;
      width: 100%;
    }

    .app-card:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.05); }
    .app-card.cash:hover { border-color: var(--gold); box-shadow: 0 10px 30px -10px var(--gold-glow); }
    .app-card.shop:hover { border-color: var(--teal); box-shadow: 0 10px 30px -10px var(--teal-glow); }

    .app-logo {
      width: 80px; height: 80px;
      border-radius: 18px;
      margin-bottom: 16px;
      object-fit: cover;
    }

    .badge-row { display: flex; gap: 6px; margin-bottom: 12px; justify-content: center; }
    .mini-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      padding: 3px 10px; border-radius: 100px;
      background: rgba(255,255,255,0.05); color: var(--muted);
      border: 1px solid var(--card-border);
    }

    h2 { font-size: 24px; margin: 0 0 8px 0; font-weight: 700; }
    
    .description { 
      color: var(--muted); 
      font-size: 14px; 
      margin-bottom: 20px; 
      line-height: 1.5;
      max-width: 280px;
    }

    .btn {
      width: 100%;
      max-width: 240px;
      height: 48px;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      border-radius: 12px; font-weight: 700; text-decoration: none;
      transition: 0.2s; font-size: 14px;
    }

    .cash .accent-text { color: var(--gold); }
    .cash .btn-main { background: var(--gold); color: #000; }
    
    .shop .accent-text { color: var(--teal); }
    .shop .btn-main { background: var(--teal); color: #000; }

    .btn-main:hover { filter: brightness(1.1); transform: scale(1.02); }

    footer {
      margin-top: 40px; /* Reduzido drasticamente */
      text-align: center;
      padding: 20px 0; 
      border-top: 1px solid var(--stroke);
      color: var(--muted2); font-size: 12px;
    }
    footer p { margin: 5px 0; }
    footer a { color: var(--muted); text-decoration: none; margin: 0 8px; }

    @media (max-width: 480px) {
      .container { padding: 20px 15px; }
      .app-card { padding: 25px 20px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <main class="container">
    <header>
      <h1>JDS Apps</h1>
      <p>Smart tools, total privacy.</p>
    </header>

    <div class="apps-grid">

      <section class="app-card cash">
        <img src="app_logo.png" alt="Cash Calculator" class="app-logo">
        <div class="badge-row">
          <span class="mini-badge">Offline</span>
          <span class="mini-badge" style="color: var(--gold)">Finance</span>
        </div>
        <h2>Cash <span class="accent-text">Calculator</span></h2>
        <p class="description">Fast tool for counting bills and coins with haptic feedback.</p>
        <a href="https://play.google.com/store/apps/details?id=com.xjucelio.cashcalculator" class="btn btn-main" target="_blank">
          Google Play
        </a>
      </section>

      <section class="app-card shop">
        <img src="shop_logo.png" alt="Shopping List" class="app-logo">
        <div class="badge-row">
          <span class="mini-badge">Offline</span>
          <span class="mini-badge" style="color: var(--teal)">Utility</span>
        </div>
        <h2>Shopping <span class="accent-text">List</span></h2>
        <p class="description">Create smart lists and track item prices in real-time.</p>
        <a href="https://play.google.com/store/apps/details?id=com.xjdsapps.shoppingcalculator" class="btn btn-main" target="_blank">
          Google Play
        </a>
      </section>

    </div>

    <footer>
      <p>&copy; <span id="year"></span> JDS Apps</p>
      <p>
        <a href="mailto:xjdsapps@gmail.com">Contact</a> • 
        <a href="/app-ads.txt">app-ads.txt</a>
      </p>
    </footer>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
